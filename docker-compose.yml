services:
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64/v8
    container_name: flowstate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowstate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - flowstate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowstate"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    command: ["redis-server", "--save", "", "--appendonly", "no", "--ignore-warnings", "ARM64-COW-BUG"]
    container_name: flowstate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - flowstate_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  flowstate_postgres_data:
  flowstate_redis_data:
